[package]
name = "github_bio"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { version = "0.5.6", features = ["router", "web"] }
dioxus-web = "*"
serde = { version = "1.0.215", features = ["derive"] }
serde_json = "1.0"
dioxus-router = "*"
stylist = "0.13.0"
manganis = "0.2.2"

[web.watcher]
index_on_404 = true
